<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>插件合并器（自动读取元信息）</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .desc {
      font-size: 13px;
      opacity: 0.72;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .panel {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
    }

    @media (max-width: 900px) {
      .panel {
        grid-template-columns: 1fr;
      }
    }

    .box {
      background: rgba(0,0,0,0.24);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px;
    }

    .box-title {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 15px;
    }

    label {
      display: block;
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 5px;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(0,0,0,0.35);
      border: 1px solid #555;
      color: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      outline: none;
      margin-bottom: 10px;
    }

    input[type="text"]:focus {
      border-color: #6aa6ff;
      box-shadow: 0 0 0 3px rgba(80,150,255,0.16);
    }

    input[type="file"] {
      display: none;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    button {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 9px;
      padding: 8px 11px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: rgba(255,255,255,0.14);
    }

    button.primary {
      background: rgba(40,167,69,0.85);
      border-color: rgba(40,167,69,0.9);
    }

    button.primary:hover {
      background: rgba(40,167,69,0.98);
    }

    button.blue {
      background: rgba(60,140,255,0.28);
      border-color: rgba(60,140,255,0.4);
    }

    button.blue:hover {
      background: rgba(60,140,255,0.38);
    }

    button.danger {
      background: rgba(255,70,70,0.2);
      border-color: rgba(255,70,70,0.32);
    }

    button.danger:hover {
      background: rgba(255,70,70,0.28);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .manual-box {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .manual-code {
      width: 100%;
      height: 160px;
      resize: vertical;
      background: rgba(0,0,0,0.35);
      color: #9fffbd;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 8px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .file-list {
      max-height: 320px;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: rgba(0,0,0,0.25);
      padding: 6px;
      margin-top: 10px;
    }

    .empty {
      opacity: 0.6;
      font-size: 12px;
      padding: 10px;
      text-align: center;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-info {
      min-width: 0;
      flex: 1;
    }

    .file-name {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .file-meta {
      font-size: 11px;
      opacity: 0.58;
      margin-top: 2px;
    }

    textarea {
      width: 100%;
      height: 620px;
      resize: vertical;
      background: #050505;
      color: #9fffbd;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre;
    }

    .status {
      margin-top: 10px;
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 9px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      opacity: 0.9;
    }

    .warn {
      color: #ffd37a;
    }

    .ok {
      color: #8fff9d;
    }

    .kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      padding: 1px 6px;
      background: rgba(0,0,0,0.38);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      font-size: 11px;
    }

    .small {
      font-size: 12px;
      opacity: 0.68;
      line-height: 1.5;
    }

    /* ===== 控制面板样式 ===== */
    .control-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 360px;
      max-height: 500px;
      background: rgba(20,20,30,0.95);
      border: 1px solid rgba(100,180,255,0.3);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      display: none;
      flex-direction: column;
      z-index: 10000;
      backdrop-filter: blur(8px);
    }

    .control-panel.show {
      display: flex;
    }

    .panel-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(100,180,255,0.2);
      cursor: move;
      user-select: none;
      background: linear-gradient(135deg, rgba(60,140,255,0.1), rgba(100,100,200,0.05));
    }

    .panel-title {
      font-weight: 700;
      font-size: 14px;
      color: #6aa6ff;
    }

    .panel-controls {
      display: flex;
      gap: 6px;
    }

    .panel-btn {
      width: 24px;
      height: 24px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all 0.2s;
    }

    .panel-btn:hover {
      background: rgba(100,180,255,0.2);
      border-color: rgba(100,180,255,0.4);
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .sub-plugin-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(100,180,255,0.15);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      transition: all 0.2s;
    }

    .sub-plugin-item:hover {
      background: rgba(100,180,255,0.08);
      border-color: rgba(100,180,255,0.3);
    }

    .sub-plugin-item.disabled {
      opacity: 0.6;
      background: rgba(255,70,70,0.08);
      border-color: rgba(255,70,70,0.2);
    }

    .sub-plugin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .sub-plugin-name {
      font-weight: 600;
      font-size: 13px;
      color: #fff;
    }

    .sub-plugin-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(40,167,69,0.3);
      color: #8fff9d;
    }

    .sub-plugin-status.disabled-state {
      background: rgba(255,70,70,0.3);
      color: #ff8888;
    }

    .sub-plugin-meta {
      font-size: 11px;
      opacity: 0.65;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .sub-plugin-meta span {
      display: block;
      margin: 2px 0;
    }

    .sub-plugin-toggle {
      display: flex;
      gap: 6px;
    }

    .toggle-btn {
      flex: 1;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 6px;
      padding: 6px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
    }

    .toggle-btn:hover {
      background: rgba(255,255,255,0.14);
    }

    .toggle-btn.active {
      background: rgba(40,167,69,0.6);
      border-color: rgba(40,167,69,0.8);
    }

    .toggle-btn.disabled-mode {
      background: rgba(255,70,70,0.4);
      border-color: rgba(255,70,70,0.6);
    }

    .panel-footer {
      border-top: 1px solid rgba(100,180,255,0.2);
      padding: 10px;
      display: flex;
      gap: 6px;
      font-size: 11px;
      opacity: 0.7;
    }

    .toggle-panel-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(60,140,255,0.8);
      border: 2px solid rgba(100,180,255,0.5);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(60,140,255,0.4);
    }

    .toggle-panel-btn:hover {
      background: rgba(60,140,255,0.95);
      box-shadow: 0 6px 24px rgba(60,140,255,0.6);
      transform: scale(1.1);
    }

    .toggle-panel-btn.hide {
      display: none;
    }

    /* 滚动条美化 */
    .panel-content::-webkit-scrollbar {
      width: 6px;
    }

    .panel-content::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }

    .panel-content::-webkit-scrollbar-thumb {
      background: rgba(100,180,255,0.3);
      border-radius: 3px;
    }

    .panel-content::-webkit-scrollbar-thumb:hover {
      background: rgba(100,180,255,0.5);
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>插件合并器（自动读取元信息）</h1>
    <div class="desc">
      上传多个 GitHub 面板插件 <span class="kbd">.js</span> 文件，或手动粘贴源码，合并为一个插件。
      合并后每个子插件会在独立作用域运行，并自动聚合 <span class="kbd">init</span>、
      <span class="kbd">onHook</span> 和 <span class="kbd">style</span>。
      <br />
      本工具会自动读取每个插件的 <span class="kbd">id</span>、
      <span class="kbd">name</span>、<span class="kbd">version</span>、
      <span class="kbd">author</span>、<span class="kbd">description</span>。
    </div>

    <div class="panel">
      <div class="box">
        <div class="box-title">配置</div>

        <label>合并后插件 ID</label>
        <input id="pluginId" type="text" value="merged-plugin" />

        <label>合并后插件名称</label>
        <input id="pluginName" type="text" value="合并插件" />

        <label>合并后插件版本</label>
        <input id="pluginVersion" type="text" value="1.0.0" />

        <label>合并后插件作者</label>
        <input id="pluginAuthor" type="text" value="" placeholder="例如：你的名字" />

        <label>合并后插件描述</label>
        <input id="pluginDescription" type="text" value="由多个插件合并生成" />

        <div class="btn-row">
          <button class="blue" id="selectBtn">选择插件文件</button>
          <button class="danger" id="clearBtn">清空所有</button>
        </div>

        <input id="fileInput" type="file" accept=".js,application/javascript,text/javascript" multiple />

        <!-- 手动输入区域 -->
        <div class="manual-box">
          <div class="box-title" style="font-size:13px;margin-top:12px;">手动输入插件代码</div>

          <label>插件文件名 / 标识</label>
          <input id="manualName" type="text" value="manual-plugin.js" placeholder="例如：my-plugin.js" />

          <label>插件源码</label>
          <textarea id="manualCode" class="manual-code" placeholder="在这里粘贴插件代码..."></textarea>

          <div class="btn-row">
            <button class="blue" id="addManualBtn">添加输入的插件</button>
            <button class="danger" id="clearManualBtn">清空输入框</button>
          </div>
        </div>

        <div class="file-list" id="fileList">
          <div class="empty">尚未选择插件文件</div>
        </div>

        <div class="btn-row">
          <button class="primary" id="mergeBtn">生成合并插件</button>
          <button class="blue" id="copyBtn">复制代码</button>
          <button class="blue" id="downloadBtn">下载 .js</button>
          <button class="blue" id="openControlBtn">🎛️ 控制面板</button>
        </div>

        <div class="small">
          注意：本工具不会执行你上传的插件代码，只会读取文本并生成合并代码。
          但合并后的插件加载到面板后，仍然拥有原插件的全部权限。请勿加载不可信插件。
        </div>

        <div id="status" class="status">就绪</div>
      </div>

      <div class="box">
        <div class="box-title">合并结果</div>
        <textarea id="output" readonly placeholder="合并后的插件代码会显示在这里..."></textarea>
      </div>
    </div>
  </div>

  <!-- 可拖动控制面板 -->
  <div id="controlPanel" class="control-panel">
    <div class="panel-titlebar">
      <span class="panel-title">🎛️ 子插件控制面板</span>
      <div class="panel-controls">
        <button class="panel-btn" id="minimizeBtn" title="最小化">−</button>
        <button class="panel-btn" id="closeBtn" title="关闭">×</button>
      </div>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="empty">暂无插件</div>
    </div>
    <div class="panel-footer">
      <span id="subPluginCount">已加载 0 个子插件</span>
    </div>
  </div>

  <!-- 浮动按钮 -->
  <button id="togglePanelBtn" class="toggle-panel-btn hide" title="打开控制面板">🎛️</button>

  <script>
    const fileInput = document.getElementById("fileInput");
    const selectBtn = document.getElementById("selectBtn");
    const clearBtn = document.getElementById("clearBtn");
    const mergeBtn = document.getElementById("mergeBtn");
    const copyBtn = document.getElementById("copyBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const openControlBtn = document.getElementById("openControlBtn");
    const fileList = document.getElementById("fileList");
    const output = document.getElementById("output");
    const statusEl = document.getElementById("status");

    // 手动输入相关元素
    const manualNameInput = document.getElementById("manualName");
    const manualCodeInput = document.getElementById("manualCode");
    const addManualBtn = document.getElementById("addManualBtn");
    const clearManualBtn = document.getElementById("clearManualBtn");

    const pluginIdInput = document.getElementById("pluginId");
    const pluginNameInput = document.getElementById("pluginName");
    const pluginVersionInput = document.getElementById("pluginVersion");
    const pluginAuthorInput = document.getElementById("pluginAuthor");
    const pluginDescriptionInput = document.getElementById("pluginDescription");

    // 控制面板元素
    const controlPanel = document.getElementById("controlPanel");
    const panelContent = document.getElementById("panelContent");
    const togglePanelBtn = document.getElementById("togglePanelBtn");
    const minimizeBtn = document.getElementById("minimizeBtn");
    const closeBtn = document.getElementById("closeBtn");
    const subPluginCount = document.getElementById("subPluginCount");

    let files = [];
    let subPluginStates = {}; // { [index]: { enabled: boolean } }
    let panelDragState = { dragging: false, startX: 0, startY: 0, startLeft: 0, startTop: 0 };

    // ========== 文件上传 ==========
    selectBtn.onclick = () => {
      fileInput.click();
    };

    fileInput.onchange = async () => {
      const selected = Array.from(fileInput.files || []);

      for (const file of selected) {
        const code = await file.text();
        const meta = readPluginMeta(code, file.name);
        files.push({
          name: file.name,
          size: file.size,
          code,
          meta
        });
      }

      fileInput.value = "";
      renderFileList();
      setStatus(`已添加 ${selected.length} 个文件，目前共 ${files.length} 个。`, "ok");
    };

    // ========== 手动输入 ==========
    addManualBtn.onclick = () => {
      const name = manualNameInput.value.trim() || ("manual-plugin-" + Date.now() + ".js");
      const code = manualCodeInput.value.trim();

      if (!code) {
        alert("请先输入插件源码");
        setStatus("请输入插件源码。", "warn");
        return;
      }

      const meta = readPluginMeta(code, name);
      files.push({
        name,
        size: new Blob([code]).size,
        code,
        meta
      });

      renderFileList();
      setStatus(`已添加手动输入插件：${name}`, "ok");

      manualNameInput.value = "manual-plugin.js";
      manualCodeInput.value = "";
    };

    clearManualBtn.onclick = () => {
      manualNameInput.value = "manual-plugin.js";
      manualCodeInput.value = "";
      setStatus("已清空手动输入框。");
    };

    // ========== 清除所有 ==========
    clearBtn.onclick = () => {
      files = [];
      subPluginStates = {};
      output.value = "";
      renderFileList();
      renderControlPanel();
      setStatus("已清空所有文件。");
    };

    // ========== 合并 ==========
    mergeBtn.onclick = () => {
      if (!files.length) {
        setStatus("请先添加至少一个插件文件或手动输入代码。", "warn");
        alert("请先添加至少一个插件文件或手动输入代码。");
        return;
      }

      const id = pluginIdInput.value.trim() || "merged-plugin";
      const name = pluginNameInput.value.trim() || "合并插件";
      const version = pluginVersionInput.value.trim() || "1.0.0";
      const author = pluginAuthorInput.value.trim();
      const description = pluginDescriptionInput.value.trim() || "由多个插件合并生成";

      // 初始化所有子插件为启用状态
      subPluginStates = {};
      files.forEach((_, index) => {
        subPluginStates[index] = { enabled: true };
      });

      const merged = buildMergedPlugin(files, {
        id,
        name,
        version,
        author,
        description
      });

      output.value = merged;
      setStatus(`生成成功：已合并 ${files.length} 个插件。`, "ok");
      
      renderControlPanel();
      togglePanelBtn.classList.remove("hide");
    };

    // ========== 复制 ==========
    copyBtn.onclick = async () => {
      if (!output.value) {
        setStatus("没有可复制的合并代码。", "warn");
        alert("请先生成合并插件。");
        return;
      }

      try {
        await navigator.clipboard.writeText(output.value);
        setStatus("合并代码已复制到剪贴板。", "ok");
      } catch (e) {
        output.select();
        document.execCommand("copy");
        setStatus("已使用备用方式复制。", "ok");
      }
    };

    // ========== 下载 ==========
    downloadBtn.onclick = () => {
      if (!output.value) {
        setStatus("没有可下载的合并代码。", "warn");
        alert("请先生成合并插件。");
        return;
      }

      const id = sanitizeFileName(pluginIdInput.value.trim() || "merged-plugin");
      const blob = new Blob([output.value], {
        type: "application/javascript;charset=utf-8"
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${id}.js`;
      a.click();

      setTimeout(() => URL.revokeObjectURL(url), 1000);
      setStatus(`已下载：${id}.js`, "ok");
    };

    // ========== 控制面板事件 ==========
    openControlBtn.onclick = () => {
      controlPanel.classList.add("show");
      togglePanelBtn.classList.add("hide");
    };

    togglePanelBtn.onclick = () => {
      controlPanel.classList.add("show");
      togglePanelBtn.classList.add("hide");
    };

    closeBtn.onclick = () => {
      controlPanel.classList.remove("show");
      togglePanelBtn.classList.remove("hide");
    };

    minimizeBtn.onclick = () => {
      controlPanel.classList.remove("show");
      togglePanelBtn.classList.remove("hide");
    };

    // ========== 可拖动功能 ==========
    const titlebar = document.querySelector(".panel-titlebar");

    titlebar.addEventListener("mousedown", (e) => {
      if (e.target.classList.contains("panel-btn")) return;
      
      panelDragState.dragging = true;
      panelDragState.startX = e.clientX;
      panelDragState.startY = e.clientY;
      
      const rect = controlPanel.getBoundingClientRect();
      panelDragState.startLeft = rect.left;
      panelDragState.startTop = rect.top;
      
      titlebar.style.userSelect = "none";
    });

    document.addEventListener("mousemove", (e) => {
      if (!panelDragState.dragging) return;

      const dx = e.clientX - panelDragState.startX;
      const dy = e.clientY - panelDragState.startY;

      const newLeft = panelDragState.startLeft + dx;
      const newTop = panelDragState.startTop + dy;

      // 边界限制
      const clampedLeft = Math.max(0, Math.min(newLeft, window.innerWidth - controlPanel.offsetWidth));
      const clampedTop = Math.max(0, Math.min(newTop, window.innerHeight - controlPanel.offsetHeight));

      controlPanel.style.left = clampedLeft + "px";
      controlPanel.style.top = clampedTop + "px";
      controlPanel.style.right = "auto";
      controlPanel.style.bottom = "auto";
    });

    document.addEventListener("mouseup", () => {
      panelDragState.dragging = false;
      titlebar.style.userSelect = "auto";
    });

    // ========== 渲染文件列表 ==========
    function renderFileList() {
      fileList.innerHTML = "";

      if (!files.length) {
        fileList.innerHTML = `<div class="empty">尚未选择插件文件</div>`;
        return;
      }

      files.forEach((file, index) => {
        const row = document.createElement("div");
        row.className = "file-item";

        const info = document.createElement("div");
        info.className = "file-info";

        const name = document.createElement("div");
        name.className = "file-name";
        name.textContent = `${index + 1}. ${file.name}`;

        const meta = document.createElement("div");
        meta.className = "file-meta";

        const m = file.meta || {};
        const metaText = [
          m.id ? `ID: ${m.id}` : "",
          m.name ? `名称: ${m.name}` : "",
          m.version ? `版本: ${m.version}` : "",
          m.author ? `作者: ${m.author}` : "",
          `${formatSize(file.size)}`,
          `${file.code.length} 字符`
        ].filter(Boolean).join(" ｜ ");

        meta.textContent = metaText;

        info.appendChild(name);
        info.appendChild(meta);

        const del = document.createElement("button");
        del.className = "danger";
        del.textContent = "移除";
        del.onclick = () => {
          files.splice(index, 1);
          delete subPluginStates[index];
          renderFileList();
          renderControlPanel();
          setStatus(`已移除：${file.name}`);
        };

        row.appendChild(info);
        row.appendChild(del);
        fileList.appendChild(row);
      });
    }

    // ========== 渲染控制面板 ==========
    function renderControlPanel() {
      panelContent.innerHTML = "";

      if (!files.length) {
        panelContent.innerHTML = `<div class="empty">尚未生成合并插件</div>`;
        subPluginCount.textContent = "已加载 0 个子插件";
        return;
      }

      const enabledCount = Object.values(subPluginStates).filter(s => s.enabled).length;
      subPluginCount.textContent = `已加载 ${enabledCount}/${files.length} 个子插件`;

      files.forEach((file, index) => {
        const state = subPluginStates[index] || { enabled: true };
        const m = file.meta || {};

        const item = document.createElement("div");
        item.className = `sub-plugin-item ${!state.enabled ? "disabled" : ""}`;

        const header = document.createElement("div");
        header.className = "sub-plugin-header";

        const name = document.createElement("div");
        name.className = "sub-plugin-name";
        name.textContent = `#${index + 1} ${m.name || file.name.replace(/\.js$/, "")}`;

        const statusBadge = document.createElement("div");
        statusBadge.className = `sub-plugin-status ${!state.enabled ? "disabled-state" : ""}`;
        statusBadge.textContent = state.enabled ? "启用" : "禁用";

        header.appendChild(name);
        header.appendChild(statusBadge);

        const meta = document.createElement("div");
        meta.className = "sub-plugin-meta";
        meta.innerHTML = [
          m.id ? `<span>ID: <code style="background:rgba(0,0,0,0.3);padding:2px 4px;border-radius:3px">${escapeHtml(m.id)}</code></span>` : "",
          m.version ? `<span>版本: ${escapeHtml(m.version)}</span>` : "",
          m.author ? `<span>作者: ${escapeHtml(m.author)}</span>` : "",
          m.description ? `<span>${escapeHtml(m.description)}</span>` : ""
        ].filter(Boolean).join("");

        const toggle = document.createElement("div");
        toggle.className = "sub-plugin-toggle";

        const enableBtn = document.createElement("button");
        enableBtn.className = `toggle-btn ${state.enabled ? "active" : ""}`;
        enableBtn.textContent = "✓ 启用";
        enableBtn.onclick = () => {
          state.enabled = true;
          renderControlPanel();
          updateOutput();
        };

        const disableBtn = document.createElement("button");
        disableBtn.className = `toggle-btn ${!state.enabled ? "disabled-mode" : ""}`;
        disableBtn.textContent = "✗ 禁用";
        disableBtn.onclick = () => {
          state.enabled = false;
          renderControlPanel();
          updateOutput();
        };

        toggle.appendChild(enableBtn);
        toggle.appendChild(disableBtn);

        item.appendChild(header);
        item.appendChild(meta);
        item.appendChild(toggle);
        panelContent.appendChild(item);
      });
    }

    // ========== 更新输出代码 ==========
    function updateOutput() {
      if (!output.value) return;

      const id = pluginIdInput.value.trim() || "merged-plugin";
      const name = pluginNameInput.value.trim() || "合并插件";
      const version = pluginVersionInput.value.trim() || "1.0.0";
      const author = pluginAuthorInput.value.trim();
      const description = pluginDescriptionInput.value.trim() || "由多个插件合并生成";

      // 过滤出启用的插件
      const enabledFiles = files.filter((_, index) => {
        const state = subPluginStates[index] || { enabled: true };
        return state.enabled;
      });

      if (enabledFiles.length === 0) {
        setStatus("警告：未启用任何子插件", "warn");
        output.value = buildMergedPlugin(enabledFiles, { id, name, version, author, description });
        return;
      }

      const merged = buildMergedPlugin(enabledFiles, { id, name, version, author, description });
      output.value = merged;
      setStatus(`已更新：合并 ${enabledFiles.length} 个启用的子插件。`, "ok");
    }

    // ========== 合并代码生成器 ==========
    function buildMergedPlugin(fileList, meta) {
      const factories = fileList.map((file, index) => {
        const m = file.meta || {};

        return `
  // ==================== 子插件 ${index + 1}: ${escapeComment(m.name || file.name)} ====================
  // 原始文件: ${escapeComment(file.name)}
  // ID: ${escapeComment(m.id || "")}
  // Name: ${escapeComment(m.name || "")}
  // Version: ${escapeComment(m.version || "")}
  // Author: ${escapeComment(m.author || "")}
  function __merged_sub_factory_${index}(context) {
    const { core, ui, api, utils, components, extension, manager } = context;

    const plugin = {
      id: ${jsString(m.id || ("sub-plugin-" + (index + 1)))},
      name: ${jsString(m.name || file.name)},
      version: ${jsString(m.version || "0.0.0")},
      author: ${jsString(m.author || "")},
      description: ${jsString(m.description || "")},
      init: function(){},
      onHook: function(){},
      style: ""
    };

${indent(file.code, 4)}

    return plugin;
  }
`;
      }).join("\n");

      const factoryNames = fileList.map((_, index) => `__merged_sub_factory_${index}`).join(", ");

      return `// ============================================================
// 由「插件合并器 HTML 版」生成（支持子插件启用/禁用控制）
// 合并时间：${new Date().toLocaleString()}
// 子插件数量：${fileList.length}
//
// 说明：
// 1. 每个子插件运行在独立作用域中。
// 2. 子插件的 init(context) 会依次执行。
// 3. 子插件的 onHook(hook, data) 会依次广播。
// 4. 子插件的 style 会在合并插件加载时收集并注入。
// 5. 可在控制面板中启用/禁用特定子插件。
// ============================================================

plugin.id = ${jsString(meta.id)};
plugin.name = ${jsString(meta.name)};
plugin.version = ${jsString(meta.version)};
plugin.author = ${jsString(meta.author || "")};
plugin.description = ${jsString(meta.description || "")};

(function(){
${factories}

  const __subFactories = [${factoryNames}];
  const __subs = [];

  function __createSubPlugin(factory, context, index) {
    try {
      const sub = factory(context);

      if (!sub) {
        console.warn("[MergedPlugin] 子插件返回为空:", index);
        return null;
      }

      if (!sub.id) sub.id = "merged-sub-" + index;
      if (!sub.name) sub.name = "Merged Sub Plugin " + index;
      if (!sub.version) sub.version = "0.0.0";

      return sub;
    } catch (e) {
      console.error("[MergedPlugin] 子插件初始化失败:", index, e);
      return null;
    }
  }

  plugin.init = function(context) {
    __subs.length = 0;

    __subFactories.forEach(function(factory, index) {
      const sub = __createSubPlugin(factory, context, index + 1);
      if (!sub) return;

      __subs.push(sub);

      if (typeof sub.init === "function") {
        try {
          sub.init(context);
        } catch (e) {
          console.error("[MergedPlugin] 子插件 init 错误:", sub.id || index, e);
        }
      }
    });

    console.log("[MergedPlugin] 已加载子插件数量:", __subs.length);
  };

  plugin.onHook = function(hookName, data) {
    __subs.forEach(function(sub, index) {
      if (sub && typeof sub.onHook === "function") {
        try {
          sub.onHook(hookName, data);
        } catch (e) {
          console.error("[MergedPlugin] 子插件 onHook 错误:", sub.id || index, hookName, e);
        }
      }
    });
  };

  // 预收集子插件 style
  let __mergedStyle = "";

  __subFactories.forEach(function(factory, index) {
    try {
      const fakeContext = {
        core: {},
        ui: {},
        api: {},
        utils: {},
        components: {},
        extension: {},
        manager: {}
      };

      const sub = factory(fakeContext);

      if (sub && sub.style) {
        __mergedStyle += "\\n/* ===== 子插件样式 " + (index + 1) + " ===== */\\n";
        __mergedStyle += sub.style + "\\n";
      }
    } catch (e) {
      // 某些插件在定义阶段依赖真实 context，探测 style 失败可忽略
    }
  });

  plugin.style = __mergedStyle;
})();
`;
    }

    // ========== 读取元信息 ==========
    function readPluginMeta(code, fallbackName) {
      const text = String(code || "");

      const meta = {
        id: "",
        name: "",
        version: "",
        author: "",
        description: ""
      };

      meta.id = readPluginField(text, "id") || "";
      meta.name = readPluginField(text, "name") || "";
      meta.version = readPluginField(text, "version") || "";
      meta.author = readPluginField(text, "author") || "";
      meta.description = readPluginField(text, "description") || "";

      // 兼容 plugin.meta = { author: "...", description: "..." }
      if (!meta.author) {
        meta.author = readObjectField(text, "author") || "";
      }

      if (!meta.description) {
        meta.description = readObjectField(text, "description") || "";
      }

      // 如果没读到 name，就用文件名兜底
      if (!meta.name) {
        meta.name = fallbackName || "";
      }

      return meta;
    }

    function readPluginField(code, field) {
      const dotReg = new RegExp(
        "plugin\\s*\\.\\s*" + escapeRegExp(field) + "\\s*=\\s*([\"'`])([\\s\\S]*?)\\1",
        "m"
      );

      const bracketReg = new RegExp(
        "plugin\\s*\\[\\s*([\"'`])" + escapeRegExp(field) + "\\1\\s*\\]\\s*=\\s*([\"'`])([\\s\\S]*?)\\2",
        "m"
      );

      let m = code.match(dotReg);
      if (m) return cleanMetaValue(m[2]);

      m = code.match(bracketReg);
      if (m) return cleanMetaValue(m[3]);

      return "";
    }

    function readObjectField(code, field) {
      const reg = new RegExp(
        escapeRegExp(field) + "\\s*:\\s*([\"'`])([\\s\\S]*?)\\1",
        "m"
      );

      const m = code.match(reg);
      return m ? cleanMetaValue(m[2]) : "";
    }

    function cleanMetaValue(value) {
      return String(value || "")
        .replace(/\$\{[\s\S]*?\}/g, "")
        .replace(/\n/g, " ")
        .trim();
    }

    function escapeRegExp(text) {
      return String(text).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // ========== 工具函数 ==========
    function jsString(value) {
      return JSON.stringify(String(value == null ? "" : value));
    }

    function indent(code, spaces) {
      const pad = " ".repeat(spaces);
      return String(code)
        .split("\n")
        .map(line => pad + line)
        .join("\n");
    }

    function escapeComment(text) {
      return String(text)
        .replace(/\*\//g, "* /")
        .replace(/\n/g, " ");
    }

    function sanitizeFileName(text) {
      return String(text || "merged-plugin")
        .replace(/[\\/:*?"<>|]/g, "_")
        .replace(/\s+/g, "_");
    }

    function formatSize(size) {
      if (size < 1024) return size + " B";
      if (size < 1024 * 1024) return (size / 1024).toFixed(1) + " KB";
      return (size / 1024 / 1024).toFixed(2) + " MB";
    }

    function setStatus(text, type) {
      statusEl.textContent = text;
      statusEl.className = "status";

      if (type === "ok") {
        statusEl.classList.add("ok");
      } else if (type === "warn") {
        statusEl.classList.add("warn");
      }
    }

    // 初始化
    renderFileList();
  </script>
</body>
</html>
